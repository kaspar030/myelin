name: release-plz

# release-plz keeps an open "release PR" on `main`. Merging it cuts the
# release: bumped crates are published to crates.io and tagged on GitHub.
#
# Required repo secrets:
#   CARGO_REGISTRY_TOKEN   crates.io API token (Account → API Tokens)
# The default GITHUB_TOKEN is used for opening PRs and creating releases.

on:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

# Avoid two release-plz runs racing on the same branch.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'kaspar030' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'kaspar030' }}
    # Run after `release-plz-release` so a freshly-released version doesn't
    # immediately reappear in a new PR.
    needs: [release-plz-release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (release-pr)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
