name: release-plz

# release-plz keeps an open "release PR" on `main`. Merging it cuts the
# release: bumped crates are published to crates.io and tagged on GitHub.
#
# Authentication: this workflow uses crates.io trusted publishing (OIDC),
# so no CARGO_REGISTRY_TOKEN secret is needed. The trusted-publishing
# config must be set up on crates.io for each crate before its first
# automated release.
#
# IMPORTANT: crates.io trusted publishing does NOT work for the very first
# publish of a brand-new crate — that has to be done manually with a
# regular API token (`cargo publish -p <crate>` from a workstation). After
# the first version exists on crates.io, this workflow takes over.

on:
  push:
    branches:
      - main

# Avoid two release-plz runs racing on the same branch.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'kaspar030' }}
    permissions:
      # Push tags and create GitHub releases.
      contents: write
      # Detect the merged release PR and its commits.
      pull-requests: read
      # Required for crates.io trusted publishing (OIDC token exchange).
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'kaspar030' }}
    # Run after `release-plz-release` so a freshly-released version doesn't
    # immediately reappear in a new PR.
    needs: [release-plz-release]
    permissions:
      # Push to the release-plz PR branch.
      contents: write
      # Open and update the release PR.
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (release-pr)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
