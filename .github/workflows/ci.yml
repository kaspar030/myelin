name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # Verify the core crate builds without std (no_std, no features).
  no-std:
    name: no_std build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p myelin --no-default-features --target thumbv7em-none-eabi

  # Verify each feature compiles independently.
  features:
    name: Feature ${{ matrix.feature }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - std
          - tokio
          - tokio-io
          - embassy
          - postcard
          - futures-io
          - smol
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.feature }}
      - run: cargo build -p myelin --no-default-features --features ${{ matrix.feature }}

  # Run the stdio integration test (spawns server subprocess).
  integration:
    name: Integration (stdio)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p testing-stdio

  # Guard against regressions of the `#[myelin::service]` macro emitting
  # `#[cfg(feature = "tokio"/"embassy")]` into destination crates. A
  # downstream crate that doesn't declare those features must build with
  # `-D warnings` and produce no `unexpected_cfgs` warnings for tokio/embassy.
  cfg-hygiene:
    name: cfg hygiene (downstream)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p testing-service --no-default-features

  # Exercise the proc-macro unit/trybuild tests with its transport features
  # toggled on explicitly. `cargo test --workspace` already covers the
  # features-on configuration via workspace unification; this job pins it.
  macros-features:
    name: myelin-macros (features)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "embassy"
          - "tokio"
          - "embassy,tokio"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: macros-${{ matrix.features }}
      - run: cargo test -p myelin-macros --features "${{ matrix.features }}"
